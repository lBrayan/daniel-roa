name: Deploy Portfolio with CDK

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & Global Tools
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install -g pnpm
          npm install -g aws-cdk

      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js App
        run: pnpm build

      # 👇 AÑADE ESTE BLOQUE EXACTAMENTE AQUÍ 👇
      - name: Prepare Standalone Build
        run: |
          # 1. Copiar public y static
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # 2. INYECCIÓN MANUAL: Forzar la copia de @swc/helpers para evadir el bug de Next.js
          mkdir -p .next/standalone/node_modules/@swc
          cp -r node_modules/@swc/helpers .next/standalone/node_modules/@swc/
          
          # 3. PRE-SYMLINK: Creamos el enlace simbólico AQUÍ en GitHub (donde es escribible), 
          # apuntando a /tmp. Cuando CDK lo suba, el enlace ya existirá.
          rm -rf .next/standalone/.next/cache
          ln -s /tmp/next-cache .next/standalone/.next/cache
          
          # 4. Script de arranque súper limpio y ligero
          cat << 'EOF' > .next/standalone/run.sh
          #!/bin/bash
          # Solo creamos la carpeta de destino en Lambda, el symlink ya existe
          mkdir -p /tmp/next-cache
          
          export HOSTNAME="0.0.0.0"
          export PORT=8080
          exec node server.js
          EOF
          
          chmod +x .next/standalone/run.sh

      - name: 🔑 Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install CDK Dependencies
        run: |
          cd infrastructure
          pnpm install

      - name: CDK Deploy
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd infrastructure
          cdk deploy --require-approval never