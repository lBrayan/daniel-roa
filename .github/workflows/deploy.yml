name: Deploy Portfolio with CDK

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & Global Tools
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm install -g pnpm
          npm install -g aws-cdk

      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js App
        run: pnpm build

      # 👇 AÑADE ESTE BLOQUE EXACTAMENTE AQUÍ 👇
      - name: Prepare Standalone Build
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          
          # Creamos el run.sh de forma limpia
          cat << 'EOF' > .next/standalone/run.sh
          #!/bin/bash
          
          # 1. Redirigir SOLO la caché a /tmp para evitar errores de solo lectura
          mkdir -p /tmp/next-cache
          rm -rf .next/cache
          ln -s /tmp/next-cache .next/cache
          
          # 2. Configurar red e iniciar servidor
          export HOSTNAME="0.0.0.0"
          export PORT=8080
          exec node server.js
          EOF
          
          chmod +x .next/standalone/run.sh

      - name: 🔑 Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install CDK Dependencies
        run: |
          cd infrastructure
          pnpm install

      - name: CDK Deploy
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd infrastructure
          cdk deploy --require-approval never