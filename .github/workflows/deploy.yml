name: Deploy Portfolio with CDK

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm

      # Un solo install en la raíz orquesta todas las dependencias (Next.js e Infra)
      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js App
        run: pnpm build

      - name: 🔑 Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CDK Deploy
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd infrastructure
          # Cambiamos npx por pnpm exec para respetar el árbol de dependencias
          pnpm exec cdk deploy --require-approval never